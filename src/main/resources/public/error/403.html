<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>403 | Vlainter</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #23252b;
      --muted: #8c93a7;
      --line: #e6e9f2;
      --grad: linear-gradient(135deg, #5d83de 0%, #ff1c91 100%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 10%, #ffffff 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 28vh 20px 40px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(93, 131, 222, 0.12);
      padding: 34px 28px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: 0.22;
      z-index: 0;
    }
    .card::before {
      width: 180px;
      height: 180px;
      background: #b8c8f7;
      top: -80px;
      left: -70px;
    }
    .card::after {
      width: 200px;
      height: 200px;
      background: #ffd1ea;
      right: -90px;
      bottom: -100px;
    }
    .inner { position: relative; z-index: 1; }
    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.2px;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }
    .ghost {
      width: 64px;
      height: 64px;
      margin: 14px auto 10px;
      background: #fff;
      border: 2px solid #d8deed;
      border-radius: 26px 26px 18px 18px;
      position: relative;
    }
    .ghost::before,
    .ghost::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff1c91;
      position: absolute;
      top: 24px;
    }
    .ghost::before { left: 20px; }
    .ghost::after { right: 20px; }
    .code {
      margin: 4px 0 8px;
      font-size: 44px;
      line-height: 1;
      font-weight: 800;
    }
    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }
    .desc {
      margin: 10px 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid #c8d2f2;
      background: #fff;
      color: #334155;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(93, 131, 222, 0.18);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="403 페이지">
      <div class="inner">
        <h1 class="logo">Vlainter</h1>
        <div class="ghost" aria-hidden="true"></div>
        <p class="code">403</p>
        <h2 class="title">접근 권한이 없어요</h2>
        <p class="desc">현재 계정으로는 이 페이지를 볼 수 없습니다.</p>
        <button class="btn" type="button" onclick="if(history.length>1){history.back()}else{location.href='/' }">이전 페이지로 돌아가기</button>
      </div>
    </section>
  </main>
</body>
</html>
