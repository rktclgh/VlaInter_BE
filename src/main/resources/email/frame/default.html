<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{mail_title}}</title>
    <style>
        body {
            font-family: "Segoe UI", "Apple SD Gothic Neo", Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 40px 24px 32px 24px;
            background: #ffffff;
        }
        .logo {
            text-align: center;
            margin-bottom: 18px;
        }
        .logo-image {
            display: block;
            width: 64px;
            height: 64px;
            margin: 0 auto 14px auto;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
            background: #ffffff;
        }
        h2 {
            color: #1f2937;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        .brand {
            color: #3b82f6;
            font-weight: 700;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }
        .footer span {
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="{{logo_src}}" alt="{{service_name}} logo" class="logo-image" />
        <h2><span class="brand">{{service_name}}</span> {{mail_title}}</h2>
    </div>
    {{content}}
    <div class="footer">
        <span>© {{footer_year}} {{service_name}} · {{footer_description}}</span>
    </div>
</div>
</body>
</html>
