spring.application.name=vlainter
spring.config.import=optional:file:.env[.properties]

# Redis (Upstash)
spring.data.redis.url=${UPSTASH_REDIS_URL}

# JWT
app.jwt.issuer=${JWT_ISSUER}
app.jwt.access-token-exp-seconds=${JWT_ACCESS_EXP_SECONDS}
app.jwt.refresh-token-exp-seconds=${JWT_REFRESH_EXP_SECONDS}
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}

# Cookie (HttpOnly)
app.cookie.domain=${COOKIE_DOMAIN}
app.cookie.secure=${COOKIE_SECURE}
app.cookie.same-site=${COOKIE_SAME_SITE}
app.cookie.access-token-name=${COOKIE_ACCESS_TOKEN_NAME}
app.cookie.refresh-token-name=${COOKIE_REFRESH_TOKEN_NAME}

# Redirect allowlist (for mobile/payment/oauth)
app.redirect.allowed-origins=${REDIRECT_ALLOWED_ORIGINS}

# CORS allowlist (for cookie-based cross-origin requests)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email verification
app.email-verification.code-exp-seconds=${EMAIL_VERIFICATION_CODE_EXP_SECONDS:300}
app.email-verification.resend-cooldown-seconds=${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
app.email-verification.code-length=${EMAIL_VERIFICATION_CODE_LENGTH:6}
