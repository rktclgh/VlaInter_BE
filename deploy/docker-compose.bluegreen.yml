services:
  proxy:
    image: nginx:1.27-alpine
    container_name: vlainter-proxy
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/runtime:/etc/nginx/runtime
    networks:
      - vlainter-net

  app-blue:
    image: ${IMAGE_TAG:-songchih/vlainter-backend:latest}
    container_name: vlainter-app-blue
    restart: always
    env_file:
      - .env
    environment:
      SERVER_PORT: 18080
    ports:
      - "127.0.0.1:18080:18080"
    networks:
      - vlainter-net

  app-green:
    image: ${IMAGE_TAG:-songchih/vlainter-backend:latest}
    container_name: vlainter-app-green
    restart: always
    env_file:
      - .env
    environment:
      SERVER_PORT: 18081
    ports:
      - "127.0.0.1:18081:18081"
    networks:
      - vlainter-net

networks:
  vlainter-net:
    name: vlainter-net
