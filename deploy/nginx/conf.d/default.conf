include /etc/nginx/runtime/active-upstream.conf;

server {
  listen 8080;
  server_name _;

  location = /actuator/health {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_pass http://vlainter_backend;
  }

  location ~ ^/api/auth/(login|signup|password/temporary)$ {
    limit_req zone=auth_req burst=10 nodelay;
    limit_conn per_ip_conn 10;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_pass http://vlainter_backend;
  }

  location / {
    limit_req zone=general_req burst=40 nodelay;
    limit_conn per_ip_conn 20;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_pass http://vlainter_backend;
  }
}
