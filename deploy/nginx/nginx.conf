worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $http_cf_connecting_ip $client_limit_key {
    default $http_cf_connecting_ip;
    "" $remote_addr;
  }

  map $status $log_rate_limited {
    default 0;
    429 1;
  }

  log_format vlainter_main
    '$time_iso8601 status=$status method=$request_method uri="$request_uri" '
    'host="$host" client_ip="$client_limit_key" remote_addr="$remote_addr" '
    'cf_ip="$http_cf_connecting_ip" xff="$http_x_forwarded_for" '
    'req_time=$request_time upstream="$upstream_addr" '
    'upstream_status="$upstream_status" upstream_time="$upstream_response_time" '
    'bytes=$body_bytes_sent ua="$http_user_agent" referer="$http_referer"';

  limit_req_zone $client_limit_key zone=general_req:10m rate=12r/s;
  limit_req_zone $client_limit_key zone=auth_req:10m rate=5r/m;
  limit_conn_zone $client_limit_key zone=per_ip_conn:10m;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 15;
  client_header_timeout 10s;
  client_body_timeout 10s;
  send_timeout 15s;
  client_max_body_size 25m;
  reset_timedout_connection on;
  limit_req_status 429;
  limit_conn_status 429;

  access_log /var/log/nginx/access.log vlainter_main;
  access_log /var/log/nginx/rate-limit.log vlainter_main if=$log_rate_limited;
  error_log /var/log/nginx/error.log warn;

  include /etc/nginx/conf.d/*.conf;
}
